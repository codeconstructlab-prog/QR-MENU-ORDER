<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>.container{
max-width:1200px;
margin:auto;
padding:0 24px;
}
.hero-banner{
display:flex;
align-items:center;
background:#0f1720;
border-radius:12px;
overflow:hidden;
}
.banner-image{
flex:1.5;
}

.banner-image img{
width:100%;
display:block;
}
.banner-image{
position:relative;
}

.banner-image::after{
content:"";
position:absolute;
top:0;
right:0;
width:150px;
height:100%;
background:linear-gradient(to right, transparent, #0f1720);
}
.banner-info{
flex:1;
padding:40px;
color:white;
display:flex;
flex-direction:column;
gap:20px;
}
.title{
display:flex;
gap:15px;
align-items:center;
}

.title img{
width:40px;
border-radius:4px;
}
button{
background:linear-gradient(90deg,#0f79ff,#00bfff);
border:none;
color:white;
padding:10px 28px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}</style>
</head>
<body>
    <section class="hero">
  <div class="container">

    <div class="hero-banner">

      <div class="banner-image">
        <img src="hero-banner.jpg" alt="">
      </div>

      <div class="banner-info">
        <div class="title">
          <img src="logo-hotstar.png" alt="">
          <div>
            <h3>Zootopia 2</h3>
            <p>Out on March 13</p>
          </div>
        </div>

        <p class="desc">
          A witty animated mystery where teamwork unravels a citywide plot.
        </p>

        <button>Trailer</button>
      </div>

    </div>

  </div>
</section>
</body>
</html>
